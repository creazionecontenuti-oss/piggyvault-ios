[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
remappings = [
    "@safe/=lib/safe-smart-account/contracts/",
    "@openzeppelin/=lib/openzeppelin-contracts/contracts/"
]

[profile.default.fmt]
line_length = 120
tab_width = 4

[etherscan]
base = { key = "${BASESCAN_API_KEY}" }

[rpc_endpoints]
base = "https://mainnet.base.org"
base_sepolia = "https://sepolia.base.org"
