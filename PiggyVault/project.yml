name: PiggyVault
options:
  bundleIdPrefix: com.piggyvault
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  web3swift:
    url: https://github.com/web3swift-team/web3swift.git
    from: "3.2.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS.git
    from: "7.1.0"

targets:
  PiggyVault:
    type: application
    platform: iOS
    sources:
      - path: PiggyVault
    info:
      path: PiggyVault/Info.plist
      properties:
        CFBundleDisplayName: PiggyVault
        CFBundleName: PiggyVault
        NSFaceIDUsageDescription: "PiggyVault uses Face ID to securely sign transactions"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - en
          - de
          - es
          - it
          - fr
          - pt
          - zh-Hans
          - ja
          - ko
          - ru
          - hi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.piggyvault.app
        PRODUCT_NAME: PiggyVault
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: web3swift
      - package: GoogleSignIn
    entitlements:
      path: PiggyVault/PiggyVault.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        keychain-access-groups:
          - "$(AppIdentifierPrefix)com.piggyvault.app"
